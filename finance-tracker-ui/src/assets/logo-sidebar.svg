<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon box (matches sidebar style) -->
  <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#bgS)"/>
  <rect x="0" y="0" width="40" height="18" rx="10" fill="white" opacity="0.07"/>

  <!-- Mini chart -->
  <rect x="6"  y="30" width="5" height="6"  rx="1.5" fill="white" opacity="0.35"/>
  <rect x="13" y="26" width="5" height="10" rx="1.5" fill="white" opacity="0.50"/>
  <rect x="20" y="21" width="5" height="15" rx="1.5" fill="white" opacity="0.65"/>
  <rect x="27" y="15" width="5" height="21" rx="1.5" fill="white" opacity="0.90"/>

  <polyline points="8.5,33  15.5,29  22.5,24  29.5,18"
    fill="none" stroke="#a5f3fc" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glowS)" opacity="0.95"/>
  <circle cx="29.5" cy="18" r="3" fill="white"/>
  <circle cx="29.5" cy="18" r="1.8" fill="#a5f3fc"/>

  <!-- Wordmark on dark bg -->
  <text x="52" y="26"
        font-family="Inter, -apple-system, Helvetica Neue, sans-serif"
        font-size="16" font-weight="700" letter-spacing="-0.3"
        fill="#f1f5f9">Finance</text>
  <text x="53" y="39"
        font-family="Inter, -apple-system, Helvetica Neue, sans-serif"
        font-size="10" font-weight="500" letter-spacing="2.5"
        fill="#818cf8">TRACKER</text>
</svg>
